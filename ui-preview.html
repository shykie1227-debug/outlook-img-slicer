<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outlook 长图助手 V5.0.0 - UI Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, "Microsoft YaHei", sans-serif;
    background: #f0f0f0;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 40px 20px;
  }

  /* ── Window frame ── */
  .window {
    width: 100%; max-width: 760px;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.06);
    overflow: hidden;
  }
  .title-bar {
    height: 36px; background: #f9f9fa;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 12px;
    border-bottom: 1px solid #e7eaef;
    -webkit-app-region: drag;
  }
  .title-bar-text { font-size: 12px; color: #7f8d9f; }
  .title-bar-btns { display: flex; gap: 8px; }
  .title-bar-btns span {
    width: 12px; height: 12px; border-radius: 50%; display: block;
  }
  .btn-close { background: #ef4444; }
  .btn-minimize { background: #f59e0b; }
  .btn-maximize { background: #10b981; }

  /* ── Root container ── */
  .content {
    padding: 20px 24px 16px 24px;
    display: flex; flex-direction: column;
    gap: 10px;
  }

  /* ── Header ── */
  .app-title { font-size: 20px; font-weight: 700; color: #0e1115; text-align: center; }
  .app-subtitle { font-size: 12px; color: #333942; text-align: center; }
  .guide-pill {
    text-align: center; padding: 8px 12px;
    background: #eff1f4; border: 1px solid #e7eaef;
    border-radius: 999px; font-size: 11px; font-weight: 500;
    color: #333942; letter-spacing: 0.3px;
  }

  /* ── Drop Zone ── */
  .drop-zone {
    min-height: 180px;
    background: #f9f9fa;
    border: 2px dashed #e7eaef;
    border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; cursor: pointer;
    transition: all 150ms ease;
  }
  .drop-zone:hover {
    border-color: #0065fd; background: #e5e9ff;
  }
  .drop-zone-icon { width: 44px; height: 44px; }
  .drop-zone-title { font-size: 14px; font-weight: 700; color: #0e1115; }
  .drop-zone-tip { font-size: 12px; color: #333942; }

  /* ── Toolbar rows ── */
  .toolbar-row {
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .label { font-size: 12px; color: #333942; white-space: nowrap; }
  .label-secondary { font-size: 12px; color: #7f8d9f; white-space: nowrap; }

  /* ── Ghost button ── */
  .btn-ghost {
    display: inline-flex; align-items: center; gap: 4px;
    height: 34px; padding: 0 14px;
    background: #eff1f4; border: none; border-radius: 999px;
    font-size: 12px; color: #0e1115; font-weight: 400;
    cursor: pointer; transition: background 150ms;
    font-family: inherit; white-space: nowrap;
  }
  .btn-ghost:hover { background: #dde1e8; }
  .btn-ghost:disabled {
    color: #b0b8c4; cursor: not-allowed;
    opacity: 0.5;
  }
  .btn-ghost:disabled:hover { background: #eff1f4; }
  .btn-ghost img { width: 18px; height: 18px; }

  /* ── Input ── */
  .input {
    height: 34px; width: 100px;
    background: #f9f9fa; color: #0e1115;
    border: 1px solid #e7eaef; border-radius: 8px;
    font-size: 12px; text-align: center;
    padding: 0 8px; outline: none;
    font-family: inherit;
    transition: border-color 150ms;
  }
  .input:focus { border-color: #557fff; }

  .input-full {
    height: 40px; width: 100%;
    background: #f9f9fa; color: #0e1115;
    border: 1px solid #e7eaef; border-radius: 8px;
    font-size: 13px; padding: 0 12px; outline: none;
    font-family: inherit; transition: border-color 150ms;
  }
  .input-full:focus { border-color: #557fff; }
  .input-full::placeholder { color: #7f8d9f; }

  /* ── Slider ── */
  .slider {
    -webkit-appearance: none; appearance: none;
    width: 160px; height: 6px; border-radius: 3px;
    background: #e7eaef; outline: none;
    align-self: center;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: #0065fd; cursor: pointer;
    border: none; margin-top: -6px;
  }
  .slider::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: #0065fd; cursor: pointer;
    border: none;
  }
  .slider::-webkit-slider-runnable-track {
    height: 6px; border-radius: 3px;
  }

  /* ── Checkbox ── */
  .checkbox-wrap {
    display: inline-flex; align-items: center; gap: 6px;
    cursor: pointer; font-size: 12px; color: #0e1115;
    font-weight: 500; user-select: none;
  }
  .checkbox-wrap input[type="checkbox"] { display: none; }
  .check-box {
    width: 18px; height: 18px; border-radius: 4px;
    border: 1px solid #e7eaef; background: #f9f9fa;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 150ms;
  }
  .check-box svg { display: none; }
  .checkbox-wrap input:checked + .check-box {
    background: #0065fd; border-color: #0065fd;
  }
  .checkbox-wrap input:checked + .check-box svg { display: block; }
  .checkbox-wrap img.icon { width: 18px; height: 18px; }

  .sep { color: #e7eaef; font-size: 12px; width: 12px; text-align: center; flex-shrink: 0; }
  .stretch { flex: 1; }

  /* ── Status ── */
  .status { font-size: 12px; color: #333942; padding: 4px 0; text-align: center; }

  /* ── Bottom buttons ── */
  .btn-row { display: flex; gap: 10px; margin-top: 4px; }
  .btn-row > * { flex: 1; }

  .btn-primary {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; height: 44px;
    background: #0065fd; color: #ffffff;
    border: none; border-radius: 999px;
    font-size: 14px; font-weight: 700;
    cursor: pointer; transition: background 150ms;
    font-family: inherit;
  }
  .btn-primary:hover { background: #0057da; }
  .btn-primary:disabled { background: #e5e9ff; color: #7f8d9f; cursor: not-allowed; }
  .btn-primary:disabled:hover { background: #e5e9ff; }
  .btn-primary img { width: 20px; height: 20px; }

  .btn-secondary {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; height: 44px;
    background: #ffffff; color: #0e1115;
    border: 1px solid #e7eaef; border-radius: 999px;
    font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 150ms;
    font-family: inherit;
  }
  .btn-secondary:hover { background: #eff1f4; border-color: #d0d5dd; }
  .btn-secondary:disabled { color: #b0b8c4; border-color: #e7eaef; cursor: not-allowed; }
  .btn-secondary:disabled:hover { background: #ffffff; }
  .btn-secondary img { width: 18px; height: 18px; }

  /* ── Version ── */
  .version-row {
    display: flex; justify-content: flex-end; gap: 4px;
    align-items: baseline;
  }
  .ver-num { font-size: 11px; font-weight: 700; color: #7f8d9f; }
  .ver-author { font-size: 10px; color: #7f8d9f; }
</style>
</head>
<body>

<div class="window">
  <!-- Title bar -->
  <div class="title-bar">
    <span class="title-bar-text">Outlook 长图助手 V5.0.0</span>
    <div class="title-bar-btns">
      <span class="btn-close"></span>
      <span class="btn-minimize"></span>
      <span class="btn-maximize"></span>
    </div>
  </div>

  <div class="content">
    <!-- 1. Title -->
    <div class="app-title">Outlook 长图助手 V5.0.0</div>

    <!-- 2. Subtitle -->
    <div class="app-subtitle">长图/PDF/PPT切片后插入Outlook邮件，保持原始清晰度</div>

    <!-- 3. Guide pill -->
    <div class="guide-pill">1  放入文件    →    2  调整切线 / 添加链接    →    3  创建邮件</div>

    <!-- 4. Drop Zone -->
    <div class="drop-zone">
      <img class="drop-zone-icon" src="icons/folder-color.svg" alt="">
      <div class="drop-zone-title">拖拽图片到此处</div>
      <div class="drop-zone-tip">支持 JPG · PNG · PDF · PPT · PSD/PSB，点击上传</div>
    </div>

    <!-- 5. Toolbar row 1 -->
    <div class="toolbar-row">
      <button class="btn-ghost">
        <img src="icons/rotate-ccw.svg" alt="">重置
      </button>
      <span class="label">邮件宽度：</span>
      <input class="input" type="text" value="650" id="widthInput">
      <span class="label-secondary">px</span>
      <input class="slider" type="range" min="400" max="1920" value="650" id="widthSlider">
      <div class="stretch"></div>
    </div>

    <!-- 6. Toolbar row 2 -->
    <div class="toolbar-row">
      <label class="checkbox-wrap">
        <img class="icon" src="icons/image.svg" alt="">
        导出图片
        <input type="checkbox" id="chkExport">
        <span class="check-box">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </span>
      </label>
      <span class="sep">│</span>
      <label class="checkbox-wrap">
        避开文字切图（推荐）
        <input type="checkbox" id="chkSmart" checked>
        <span class="check-box">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </span>
      </label>
      <div class="stretch"></div>
    </div>

    <!-- 7. Toolbar row 3 -->
    <div class="toolbar-row">
      <button class="btn-ghost" disabled>
        <img src="icons/clipboard-copy.svg" alt="">复制到 Outlook
      </button>
      <button class="btn-ghost" disabled>
        <img src="icons/scissors.svg" alt="">调整切图位置
      </button>
      <button class="btn-ghost" disabled>
        <img src="icons/mouse-pointer-click.svg" alt="">添加可点击按钮
      </button>
      <div class="stretch"></div>
    </div>

    <!-- 8. Subject -->
    <div class="label" style="text-align:center;">邮件标题（可选）</div>
    <input class="input-full" type="text" placeholder="在此输入邮件标题，留空则使用默认标题">

    <!-- 9. Status -->
    <div class="status">ℹ️ 拖入文件后自动切图，再检查切线并在经典 Outlook 中创建邮件</div>

    <!-- 10. Bottom buttons -->
    <div class="btn-row">
      <button class="btn-primary" disabled>
        <img src="icons/mail.svg" alt="">在 Outlook 中创建邮件
      </button>
      <button class="btn-secondary" disabled>
        <img src="icons/arrow-down-to-line.svg" alt="">保存切图
      </button>
    </div>

    <!-- 11. Version -->
    <div class="version-row">
      <span class="ver-num">V5.0.0</span>
      <span class="ver-author">xiaoming</span>
    </div>
  </div>
</div>

<script>
  const wInput = document.getElementById('widthInput');
  const wSlider = document.getElementById('widthSlider');
  wInput.addEventListener('input', () => {
    let v = parseInt(wInput.value);
    if (!isNaN(v)) { v = Math.max(400, Math.min(1920, v)); wSlider.value = v; }
  });
  wSlider.addEventListener('input', () => { wInput.value = wSlider.value; });
</script>

</body>
</html>
