# Electron Builder 配置（V6.0.0）
# 用法：npm run dist   (在根目录)
# 前置条件：
#   1. app/dist 已构建 (npm run build:renderer)
#   2. electron/dist-electron 已构建 (npm run build:main)
#   3. sidecar/dist/sidecar_server.exe 已 PyInstaller 打包（Windows 上运行 PyInstaller）
appId: com.outlook.img.slicer
productName: Outlook 长图助手
copyright: Copyright © 2026

directories:
  output: dist
  buildResources: build-resources
  app: .

# 压缩配置：使用 maximum 减小体积，首次构建较慢但最终体积更小
compression: maximum

# 移除不需要的默认文件
removePackageScripts: true
removePackageKeywords: true

files:
  - electron/dist-electron/**/*
  - package.json
  - "!**/*.map"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}/**"
  - "!**/node_modules/*.d.ts"
  - "!**/node_modules/.bin"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!**/._*"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}"
  - "!**/{__pycache__,thumbs.db,.flowconfig,.idea,.vs,.nyc_output}"
  - "!**/{appveyor.yml,.travis.yml,circle.yml}"
  - "!**/{npm-debug.log,yarn.lock,.yarn-integrity,.yarn-metadata.json}"

extraResources:
  # 把 app 渲染产物作为额外资源
  - from: app/dist
    to: app
    filter: ["**/*"]
  # Python Sidecar 可执行（PyInstaller 产物）
  - from: sidecar/dist
    to: sidecar
    filter: ["**/*.exe", "**/*.dll"]
  # 窗口图标（用于主进程 setIcon）
  - from: icon.ico
    to: icon.ico

asar: true
asarUnpack:
  # Sidecar exe 不能在 asar 内（需要 spawn 外部 exe）
  - "**/*.exe"
  - "**/*.dll"

# 不包含的语言包，减小体积
electronLanguages: ["zh-CN", "en-US"]

# Windows 绿色免安装版配置（portable）
win:
  target:
    - target: portable
      arch:
        - x64
  icon: icon.ico
  artifactName: ${productName}-V${version}-portable-${arch}.${ext}
  # 不代码签名（个人使用）
  signAndEditExecutable: false
  # 不验证签名
  verifyUpdateCodeSignature: false

portable:
  # 便携版：解压即用，不写入注册表，不安装到系统目录
  artifactName: ${productName}-V${version}-portable-${arch}.${ext}
  # 不请求管理员权限（普通用户可直接运行）
  requestExecutionLevel: user
  # 不创建快捷方式（绿色版）
  

# Mac 配置（开发用，产物用户不下载）
mac:
  target: dir
  icon: icon.ico
  category: public.app-category.productivity

# 通用：应用元信息
extraMetadata:
  name: Outlook 长图助手
  version: 6.0.3
  author: outlook-img-slicer
  description: Outlook 长图助手（V6 Electron + V5 Python Sidecar）
  type: commonjs
