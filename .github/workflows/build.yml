name: Build & Release

on:
  push:
    branches: [v3-2026-05-09]
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set UTF-8 encoding
        run: chcp 65001

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build EXE
        env:
          PYTHONIOENCODING: utf-8
        run: python build.py

      - name: Compress EXE
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/Outlook长图插入工具.exe" -DestinationPath "dist/OutlookImgSlicer-V5.0.0.zip" -Force
          Write-Host "EXE size MB:"
          (Get-Item "dist/Outlook长图插入工具.exe").Length / 1MB
          Write-Host "ZIP size MB:"
          (Get-Item "dist/OutlookImgSlicer-V5.0.0.zip").Length / 1MB

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OutlookImgSlicer-V5.0.0
          path: |
            dist/Outlook长图插入工具.exe
            dist/OutlookImgSlicer-V5.0.0.zip
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: OutlookImgSlicer-V5.0.0

      - name: Upload Release assets
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "Outlook长图插入工具.exe" \
            "OutlookImgSlicer-V5.0.0.zip" \
            --repo "${{ github.repository }}" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
