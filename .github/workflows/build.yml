name: Build and Release EXE

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
        shell: cmd

      - name: Build single-file EXE
        run: pyinstaller --clean --noconfirm outlook_img_slicer.spec
        shell: cmd

      - name: Package EXE
        run: |
          powershell -Command "Get-ChildItem dist/ -Filter '*.exe' | ForEach-Object { Compress-Archive -Path $_.FullName -DestinationPath 'outlook-img-slicer-windows.zip' -Force }"
        shell: cmd

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            outlook-img-slicer-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: outlook-exe
          path: outlook-img-slicer-windows.zip

  build-macos:
    runs-on: macos-latest
    if: github.event_name == 'release'
    # macOS 版仅包含图片处理功能，不含 Outlook 自动化（pywin32 为 Windows 专有）
    # 注意：spec 文件含 Windows 专属选项(console=False)，仅 release 时构建

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies (without pywin32)
        run: pip install PySide6 Pillow PyMuPDF pyinstaller

      - name: Build APP
        run: pyinstaller --clean --noconfirm outlook_img_slicer.spec
        env:
          MACOS_BUILD: "true"

      - name: Package APP folder
        run: zip -r outlook-img-slicer-macos.zip dist/*

      - name: Upload APP to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            outlook-img-slicer-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
