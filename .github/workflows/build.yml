name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set UTF-8 encoding
        run: chcp 65001

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests and runtime safety audit
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests/ -q
          python -m compileall -q build.py desktop tests image_slicer.py html_assembler.py outlook_sender.py clipboard_html.py clickable_map.py hotspot_slicer.py image_safety.py pdf_slicer.py ppt_slicer.py psd_slicer.py

      - name: Build EXE
        env:
          PYTHONIOENCODING: utf-8
        run: python build.py

      - name: Verify build manifest
        shell: pwsh
        run: |
          $manifest = Get-Content -Raw -Encoding UTF8 build-manifest.json | ConvertFrom-Json
          if ($manifest.artifact_kind -ne "onefile") { throw "Release requires onefile artifact" }
          if (-not (Test-Path $manifest.artifact_path)) { throw "Manifest artifact missing" }
          $hash = (Get-FileHash -Algorithm SHA256 $manifest.artifact_path).Hash.ToLowerInvariant()
          if ($hash -ne $manifest.sha256) { throw "Manifest SHA-256 mismatch" }
          if ($manifest.git_sha -ne "${{ github.sha }}") { throw "Manifest source commit mismatch" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $manifest.artifact_path (Join-Path dist $manifest.release_filename) -Force

      - name: Compute release asset names
        id: asset_names
        shell: pwsh
        run: |
          $manifest = Get-Content -Raw -Encoding UTF8 build-manifest.json | ConvertFrom-Json
          $version = $manifest.app_version
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OutlookImgSlicer-V${{ steps.asset_names.outputs.version }}
          path: |
            dist/OutlookImgSlicer-V*.exe
            build-manifest.json
          retention-days: 5
