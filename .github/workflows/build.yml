name: Build and Release Executables

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies (lite)
        run: pip install PySide6 Pillow pywin32 && pip install pyinstaller
        shell: cmd

      - name: Build EXE with PyInstaller
        run: pyinstaller --clean --noconfirm outlook_img_slicer.spec
        shell: cmd

      - name: Package EXE folder
        run: |
          powershell -Command "Compress-Archive -Path 'dist/*' -DestinationPath 'outlook-img-slicer-lite-windows.zip' -Force"
        shell: cmd

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            outlook-img-slicer-lite-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies (lite)
        run: pip install PySide6 Pillow && pip install pyinstaller

      - name: Build APP with PyInstaller
        run: pyinstaller --clean --noconfirm outlook_img_slicer.spec

      - name: Package APP folder
        run: zip -r outlook-img-slicer-lite-macos.zip dist/*

      - name: Upload APP to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            outlook-img-slicer-lite-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
