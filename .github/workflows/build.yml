name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pyinstaller
        shell: cmd

      - name: Build EXE with PyInstaller
        run: pyinstaller --clean --noconfirm outlook_img_slicer.spec
        shell: cmd

      - name: Package EXE folder
        run: |
          powershell -Command "Compress-Archive -Path 'dist/*' -DestinationPath 'Outlook长图插入工具.zip' -Force"
        shell: cmd

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Outlook长图插入工具-EXE
          path: Outlook长图插入工具.zip
          retention-days: 30

      - name: Create Release & Upload EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          release_name: Outlook长图插入工具 v${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            Outlook长图插入工具.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
