name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set UTF-8 encoding
        run: chcp 65001

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests and runtime safety audit
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests/ -q
          python -m py_compile build.py desktop/*.py image_slicer.py html_assembler.py outlook_sender.py clipboard_html.py clickable_map.py hotspot_slicer.py image_safety.py pdf_slicer.py ppt_slicer.py psd_slicer.py

      - name: Build EXE
        env:
          PYTHONIOENCODING: utf-8
        run: python build.py

      - name: Verify build manifest
        shell: pwsh
        run: |
          $manifest = Get-Content -Raw -Encoding UTF8 build-manifest.json | ConvertFrom-Json
          if ($manifest.artifact_kind -ne "onefile") { throw "Release requires onefile artifact" }
          if (-not (Test-Path $manifest.artifact_path)) { throw "Manifest artifact missing" }
          $hash = (Get-FileHash -Algorithm SHA256 $manifest.artifact_path).Hash.ToLowerInvariant()
          if ($hash -ne $manifest.sha256) { throw "Manifest SHA-256 mismatch" }
          if ("${{ github.event_name }}" -eq "release") {
            $tagVersion = "${{ github.event.release.tag_name }}" -replace '^v', ''
            if ($tagVersion -ne $manifest.app_version) { throw "Release tag does not match app version" }
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $manifest.artifact_path (Join-Path dist $manifest.release_filename) -Force

      - name: Compute release asset names
        id: asset_names
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if ($tag -match "v(\d+\.\d+\.\d+)") {
            $version = $Matches[1]
          } else {
            $version = "dev"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "zip_name=OutlookImgSlicer-V$version.zip" >> $env:GITHUB_OUTPUT

      - name: Compress EXE
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          $exe = Get-ChildItem "dist/OutlookImgSlicer-V*.exe" | Select-Object -First 1
          Compress-Archive -Path $exe.FullName -DestinationPath "dist/${{ steps.asset_names.outputs.zip_name }}" -Force
          Write-Host "EXE size MB:"
          $exe.Length / 1MB
          Write-Host "ZIP size MB:"
          (Get-Item "dist/${{ steps.asset_names.outputs.zip_name }}").Length / 1MB

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OutlookImgSlicer-V${{ steps.asset_names.outputs.version }}
          path: |
            dist/OutlookImgSlicer-V*.exe
            build-manifest.json
            dist/${{ steps.asset_names.outputs.zip_name }}
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Compute release asset names
        id: asset_names
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name }}"
          if [[ "$tag" =~ v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            version="${BASH_REMATCH[1]}"
          else
            version="dev"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "zip_name=OutlookImgSlicer-V$version.zip" >> "$GITHUB_OUTPUT"

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: OutlookImgSlicer-V${{ steps.asset_names.outputs.version }}

      - name: Upload Release assets
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "dist/OutlookImgSlicer-V${{ steps.asset_names.outputs.version }}.exe#OutlookImgSlicer.exe" \
            "${{ steps.asset_names.outputs.zip_name }}" \
            --repo "${{ github.repository }}" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
